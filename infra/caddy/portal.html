<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Spartan Gate</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111318;
      --panel: #1a1f27;
      --line: #343b46;
      --text: #f2f4f7;
      --muted: #aab2bf;
      --accent: #d1432f;
      --gold: #d7a84b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 32px;
    }
    main {
      width: min(760px, 100%);
      border: 1px solid var(--line);
      background: var(--panel);
      padding: 28px;
      border-radius: 8px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0;
    }
    p {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.5;
    }
    nav {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }
    a {
      display: block;
      border: 1px solid var(--line);
      color: var(--text);
      text-decoration: none;
      padding: 14px 16px;
      border-radius: 6px;
      background: #151922;
    }
    a:hover {
      border-color: var(--accent);
    }
    span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Spartan Gate</h1>
    <p>A private security gate for Hermes-class agents.</p>
    <nav>
      <a href="http://localhost:18789">Hermes API<span>Agent gateway</span></a>
      <a href="http://localhost:18790">ClawRoute<span>LLM router dashboard</span></a>
      <a href="http://localhost:9119">Hermes Dashboard<span>Sessions and runtime controls</span></a>
      <a href="http://localhost:3005">Browserless<span>Browser debugger</span></a>
    </nav>
  </main>
</body>
</html>
