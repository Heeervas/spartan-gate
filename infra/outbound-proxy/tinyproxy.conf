# --- Tinyproxy-Konfiguration (Outbound-Whitelist-Proxy) ---
User nobody
Group nogroup
Port 8888
Timeout 600

# Allow Docker private bridge networks. The Compose subnet can be overridden
# for local validation while keeping this proxy unavailable to the public net.
Allow 172.16.0.0/12

# Whitelist / filter settings. /tmp/spartan-whitelist.txt is generated by
# infra/outbound-proxy/entrypoint.sh from public + private whitelist fragments.
Filter "/tmp/spartan-whitelist.txt"
FilterURLs On
FilterExtended Off
FilterDefaultDeny Yes

# Logging
LogLevel Info
