name: Bug Report
description: Report a reproducible Spartan Gate bug without secrets.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include tokens, OAuth files, browser profiles, private host paths,
        local domains, or credential-bearing logs. Use private vulnerability
        reporting for security issues.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal commands or steps.
      placeholder: |
        1. Run ...
        2. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Docker version, tier, browser mode, and relevant public config.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Redacted Logs
      description: Paste only redacted logs.
      render: text
