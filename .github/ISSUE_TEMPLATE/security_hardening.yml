name: Security Hardening
description: Suggest non-sensitive defensive improvements.
title: "[Hardening]: "
labels: ["security", "hardening"]
body:
  - type: markdown
    attributes:
      value: |
        Do not disclose active vulnerabilities, exploit details, secrets, private
        paths, or credential-bearing logs here. Use private vulnerability
        reporting for sensitive reports.
  - type: textarea
    id: boundary
    attributes:
      label: Boundary
      description: Which boundary is involved?
      placeholder: Hermes isolation, proxy/DNS egress, Reader, ClawRoute, Caddy, Browserless, Camofox...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: tradeoffs
    attributes:
      label: Tradeoffs
      description: Compatibility, operations, or usability impact.
