# Copy to private/compose.local.yml and replace placeholders with local values.

services:
  proxy:
    volumes:
      # private/local: project and personal outbound domains.
      - ../../private/outbound-proxy/whitelist.private.txt:/etc/tinyproxy/whitelist.private.txt:ro

  dns:
    volumes:
      # private/local: same domain extension used by the DNS relay.
      - ../../private/outbound-proxy/whitelist.private.txt:/etc/dns-whitelist.private.txt:ro

  browserless:
    volumes:
      # private/local: persistent Chromium profiles outside the repo.
      - ${SPARTAN_BROWSERLESS_PROFILES_PATH:-../../runtime/browserless/profiles}:/profiles:Z

  camofox:
    volumes:
      # private/local: Camofox storageState, cookies, and traces outside the repo.
      - ${SPARTAN_CAMOFOX_DATA_PATH:-../../runtime/camofox}:/root/.camofox:Z
      # private/local: extracted Firefox add-ons, mounted read-only.
      - ${SPARTAN_CAMOFOX_ADDONS_PATH:-../../runtime/camofox/addons}:/opt/camofox-addons:ro,Z

  caddy:
    ports:
      # private/local: expose edge over Tailscale without LAN discovery.
      - "${TAILSCALE_IP}:${SPARTAN_GATE_PORT:-18789}:18789"
      - "${TAILSCALE_IP}:${CLAWROUTE_EDGE_PORT:-18790}:18790"
      - "${TAILSCALE_IP}:${BROWSERLESS_DEBUG_PORT:-3005}:3005"
      - "${TAILSCALE_IP}:${HERMES_DASHBOARD_PORT:-9119}:9119"
      - "${TAILSCALE_IP}:${CAMOFOX_NOVNC_PORT:-26080}:26080"
      # private/local extra Hermes app ports:
      # scripts/add-port.sh inserts below this line.
    volumes:
      # private/local: optional HTTPS edge. Copy private.example/caddy/Caddyfile.https.example
      # to private/caddy/Caddyfile.https, set SPARTAN_CADDY_CERTS_PATH, then uncomment:
      # - ../../private/caddy/Caddyfile.https:/etc/caddy/Caddyfile:ro
      # - ${SPARTAN_CADDY_CERTS_PATH}:/certs:ro
      # private/local: extra Caddy listeners generated by scripts/add-port.sh.
      - ../../private/caddy.local.d:/etc/caddy/local.d:ro

  hermes:
    environment:
      # private/local: optional integrations and s6 profile bootstrap.
      HERMES_AUTOSTART_PROFILES: ${HERMES_AUTOSTART_PROFILES:-}
      HERMES_DUMP_REQUESTS: ${HERMES_DUMP_REQUESTS:-false}
      HERMES_DUMP_REQUEST_STDOUT: ${HERMES_DUMP_REQUEST_STDOUT:-false}
      TELEGRAM_BOT_TOKEN: ${HERMES_TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ALLOWED_USERS: ${HERMES_TELEGRAM_ALLOWED_USERS:-}
      TELEGRAM_DM_POLICY: ${TELEGRAM_DM_POLICY:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_ALLOWED_USERS: ${DISCORD_ALLOWED_USERS:-}
      DISCORD_HOME_CHANNEL: ${DISCORD_HOME_CHANNEL:-}
      DISCORD_PROXY: http://proxy:8888
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_USERNAME: ${GITHUB_USERNAME:-}
      GITHUB_EMAIL: ${GITHUB_EMAIL:-}
      COPILOT_GITHUB_TOKEN: ${COPILOT_GITHUB_TOKEN:-}
      RAINDROP_API_KEY: ${RAINDROP_API_KEY:-}
      GOOGLE_PROJECT_ID: ${GOOGLE_PROJECT_ID:-}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT:-}
      GOG_KEYRING_BACKEND: file
      GOG_KEYRING_PASSWORD: ${GOG_KEYRING_PASSWORD:-}
      FRED_API_KEY: ${FRED_API_KEY:-}
      MASSIVE_API_KEY: ${MASSIVE_API_KEY:-}
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}

      # private/local: Camofox browser mode credentials for Hermes and
      # supervised profile gateways.
      CAMOFOX_URL: ${CAMOFOX_URL:-}
      CAMOFOX_ACCESS_KEY: ${CAMOFOX_ACCESS_KEY:-}
      CAMOFOX_USER_ID: ${CAMOFOX_USER_ID:-}
      CAMOFOX_SESSION_KEY: ${CAMOFOX_SESSION_KEY:-}
      HERMES_MEET_CAMOFOX_SESSION_KEY: ${HERMES_MEET_CAMOFOX_SESSION_KEY:-}
      CAMOFOX_ADOPT_EXISTING_TAB: ${CAMOFOX_ADOPT_EXISTING_TAB:-true}

      # private/local profile examples. Copy these lines for extra profile names.
      TELEGRAM_BOT_TOKEN_COACH: ${HERMES_TELEGRAM_BOT_TOKEN_COACH:-}
      TELEGRAM_ALLOWED_USERS_COACH: ${HERMES_TELEGRAM_ALLOWED_USERS_COACH:-}
      DISCORD_BOT_TOKEN_COACH: ${DISCORD_BOT_TOKEN_COACH:-}
      DISCORD_ALLOWED_USERS_COACH: ${DISCORD_ALLOWED_USERS_COACH:-}
      DISCORD_HOME_CHANNEL_COACH: ${DISCORD_HOME_CHANNEL_COACH:-}
      TELEGRAM_BOT_TOKEN_WORK: ${HERMES_TELEGRAM_BOT_TOKEN_WORK:-}
      TELEGRAM_ALLOWED_USERS_WORK: ${HERMES_TELEGRAM_ALLOWED_USERS_WORK:-}
      DISCORD_BOT_TOKEN_WORK: ${DISCORD_BOT_TOKEN_WORK:-}
      DISCORD_ALLOWED_USERS_WORK: ${DISCORD_ALLOWED_USERS_WORK:-}
      DISCORD_HOME_CHANNEL_WORK: ${DISCORD_HOME_CHANNEL_WORK:-}
      TELEGRAM_BOT_TOKEN_MARKET: ${HERMES_TELEGRAM_BOT_TOKEN_MARKET:-}
      TELEGRAM_ALLOWED_USERS_MARKET: ${HERMES_TELEGRAM_ALLOWED_USERS_MARKET:-}
      DISCORD_BOT_TOKEN_MARKET: ${DISCORD_BOT_TOKEN_MARKET:-}
      DISCORD_ALLOWED_USERS_MARKET: ${DISCORD_ALLOWED_USERS_MARKET:-}
      DISCORD_HOME_CHANNEL_MARKET: ${DISCORD_HOME_CHANNEL_MARKET:-}
    volumes:
      # private/local: persistent Hermes data outside the repo.
      - ${SPARTAN_HERMES_DATA_PATH:-../../runtime/hermes}:/opt/data:Z
      # private/local: optional GogCLI credentials.
      - ${SPARTAN_GOGCLI_DATA_PATH:-../../runtime/gogcli}:/opt/data/.config/gogcli:Z
      # private/local: same persistent Chromium profiles mounted by Browserless.
      - ${SPARTAN_BROWSERLESS_PROFILES_PATH:-../../runtime/browserless/profiles}:/profiles:Z
      # private/local: agent can inspect local outbound whitelist additions.
      - ../../private/outbound-proxy/whitelist.private.txt:/etc/proxy-whitelist.private.txt:ro

  clawroute:
    volumes:
      # private/local: persistent ClawRoute data outside the repo.
      - ${SPARTAN_CLAWROUTE_DATA_PATH:-../../runtime/clawroute}:/app/data:Z
      # private/local: optional Codex auth profiles. Add only paths that exist.
      # - /absolute/path/to/codex-profile:/.codex:ro
